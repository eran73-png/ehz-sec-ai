<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html { background:#060d1a; width:720px; height:1280px; overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif; }
body { width:720px; height:1280px; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; overflow:hidden; }

.grid { position:absolute; inset:0;
  background-image: linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
  background-size:50px 50px; }

/* Concentric rings */
.ring { position:absolute; border-radius:50%; border:1px solid rgba(0,212,255,0.12); top:50%; left:50%; transform:translate(-50%,-52%); }
.ring1 { width:560px; height:560px; }
.ring2 { width:420px; height:420px; border-color:rgba(0,212,255,0.09); }
.ring3 { width:280px; height:280px; border-color:rgba(0,212,255,0.07); }
.glow { position:absolute; width:380px; height:380px; background:radial-gradient(circle, rgba(0,212,255,0.18) 0%, transparent 65%); top:50%; left:50%; transform:translate(-50%,-52%); }

.corner { position:absolute; width:44px; height:44px; border-color:#00d4ff; border-style:solid; opacity:0.3; }
.corner-tl { top:28px; left:28px; border-width:2px 0 0 2px; }
.corner-tr { top:28px; right:28px; border-width:2px 2px 0 0; }
.corner-bl { bottom:28px; left:28px; border-width:0 0 2px 2px; }
.corner-br { bottom:28px; right:28px; border-width:0 2px 2px 0; }

.content { position:relative; z-index:10; display:flex; flex-direction:column; align-items:center; text-align:center; padding:0 50px; width:100%; }

/* Logo */
.logo-wrap {
  width:110px; height:110px; border-radius:28px;
  background:linear-gradient(135deg, #00d4ff, #0066cc);
  display:flex; align-items:center; justify-content:center;
  font-size:54px; margin-bottom:36px;
  box-shadow: 0 0 80px rgba(0,212,255,0.5), 0 20px 40px rgba(0,0,0,0.4);
}

.eyebrow { font-size:13px; letter-spacing:5px; color:rgba(0,212,255,0.7); text-transform:uppercase; font-weight:700; margin-bottom:18px; }

.brand-name {
  font-size:72px; font-weight:900; color:#fff; line-height:1;
  letter-spacing:-2px; margin-bottom:10px;
  text-shadow: 0 0 100px rgba(0,212,255,0.4);
}
.brand-name em { color:#00d4ff; font-style:normal; }

.tagline { font-size:20px; color:rgba(255,255,255,0.45); letter-spacing:2px; margin-bottom:52px; font-weight:300; }

.divider { width:120px; height:2px; background:linear-gradient(90deg,transparent,#00d4ff,transparent); margin-bottom:52px; }

.desc { font-size:22px; font-weight:600; color:rgba(255,255,255,0.82); line-height:1.55; margin-bottom:44px; }

.pills { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
.pill {
  padding:9px 22px; border-radius:100px;
  background:rgba(0,212,255,0.08); border:1px solid rgba(0,212,255,0.28);
  font-size:13px; font-weight:700; color:#00d4ff; letter-spacing:1px;
}

.version { position:absolute; bottom:44px; font-size:12px; color:rgba(255,255,255,0.18); letter-spacing:2px; }
.slide-logo{position:absolute;top:34px;left:82px;z-index:50;display:flex;align-items:center;gap:9px;}
.sl-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#00d4ff,#0066cc);display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 4px 20px rgba(0,212,255,0.35);}
.sl-name{font-size:15px;font-weight:800;color:#fff;letter-spacing:-0.3px;}
.sl-name em{color:#00d4ff;font-style:normal;}
</style>
</head>
<body>
<div class="slide-logo"><div class="sl-icon">🛡️</div><div class="sl-name">Flow<em>Guard</em></div></div>
<div class="grid"></div>
<div class="ring ring1"></div>
<div class="ring ring2"></div>
<div class="ring ring3"></div>
<div class="glow"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="content">
  <div class="logo-wrap">🛡️</div>
  <div class="eyebrow">Introducing</div>
  <div class="brand-name">Flow<em>Guard</em></div>
  <div class="tagline">Claude Code Security Monitor</div>
  <div class="divider"></div>
  <div class="desc">The first dedicated security layer<br>for AI coding assistants.<br>Real-time. Zero-config. Always on.</div>
  <div class="pills">
    <span class="pill">6 Detection Engines</span>
    <span class="pill">Instant Alerts</span>
    <span class="pill">Local Deploy</span>
  </div>
</div>

<div class="version">v2.0 — EHZ-AI Security Solutions</div>
</body>
</html>
