<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html {
  background: #030812;
  width: 720px; height: 1280px;
  overflow: hidden;
  font-family: 'Segoe UI', system-ui, sans-serif;
}
body { width:720px; height:1280px; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; overflow:hidden; }

/* Grid background */
.grid {
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(16,185,129,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(16,185,129,0.06) 1px, transparent 1px);
  background-size: 48px 48px;
}

/* Glow orb */
.orb {
  position:absolute;
  width:500px; height:500px;
  background: radial-gradient(circle, rgba(16,185,129,0.12) 0%, transparent 70%);
  top:50%; left:50%; transform:translate(-50%,-50%);
}

/* Scan line */
.scanline {
  position:absolute;
  width:100%; height:2px;
  background: linear-gradient(90deg, transparent, rgba(16,185,129,0.6), transparent);
  top:30%;
}

.content {
  position:relative; z-index:10;
  display:flex; flex-direction:column; align-items:center;
  text-align:center; padding:60px 50px;
}

.eye-icon {
  font-size:80px; margin-bottom:40px;
  filter: drop-shadow(0 0 30px rgba(16,185,129,0.8));
}

.question {
  font-size:22px; font-weight:400; letter-spacing:3px; text-transform:uppercase;
  color: rgba(16,185,129,0.7); margin-bottom:20px;
}

.main-text {
  font-size:52px; font-weight:900; line-height:1.1;
  color: #ffffff;
  text-shadow: 0 0 60px rgba(16,185,129,0.4);
  margin-bottom:16px;
}

.main-text span { color:#10b981; }

.sub-text {
  font-size:28px; font-weight:300; color:rgba(255,255,255,0.5);
  margin-bottom:60px; line-height:1.4;
}

.divider {
  width:80px; height:2px;
  background: linear-gradient(90deg, transparent, #10b981, transparent);
  margin-bottom:60px;
}

.big-question {
  font-size:36px; font-weight:700; color:rgba(255,255,255,0.9);
  line-height:1.3;
}
.big-question span { color:#ef4444; }

/* Corner decorations */
.corner {
  position:absolute; width:40px; height:40px;
  border-color:#10b981;
  border-style:solid;
  opacity:0.4;
}
.corner-tl { top:30px; left:30px; border-width:2px 0 0 2px; }
.corner-tr { top:30px; right:30px; border-width:2px 2px 0 0; }
.corner-bl { bottom:30px; left:30px; border-width:0 0 2px 2px; }
.corner-br { bottom:30px; right:30px; border-width:0 2px 2px 0; }

/* Badge */
.badge {
  position:absolute; bottom:60px;
  font-size:13px; letter-spacing:2px; color:rgba(16,185,129,0.5);
  text-transform:uppercase;
}
</style>
</head>
<body>
<div class="grid"></div>
<div class="orb"></div>
<div class="scanline"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="content">
  <div class="eye-icon">🛡️</div>
  <div class="question">Security Alert</div>
  <div class="main-text">Claude Code<br>is <span>Watching</span><br>You.</div>
  <div class="sub-text">Your files. Your secrets.<br>Your entire codebase.</div>
  <div class="divider"></div>
  <div class="big-question">But who is watching<br><span>Claude Code?</span></div>
</div>

<div class="badge">EHZ-AI Security Solutions</div>
</body>
</html>
