<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@1,800;1,900&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  background: linear-gradient(135deg, #0a1628 0%, #0d1f3c 50%, #0a1628 100%);
  width:800px; height:500px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Barlow Condensed', system-ui, sans-serif;
  position:relative; overflow:hidden;
}

/* Background grid */
body::before {
  content:'';
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* Glow behind logo */
.glow {
  position:absolute;
  width:500px; height:300px;
  background:radial-gradient(ellipse, rgba(0,212,255,0.07) 0%, transparent 70%);
  top:50%; left:50%; transform:translate(-50%,-50%);
}

/* Corner marks */
.corner { position:absolute; width:30px; height:30px; border-color:rgba(0,212,255,0.15); border-style:solid; }
.tl { top:20px; left:20px; border-width:1px 0 0 1px; }
.tr { top:20px; right:20px; border-width:1px 1px 0 0; }
.bl { bottom:20px; left:20px; border-width:0 0 1px 1px; }
.br { bottom:20px; right:20px; border-width:0 1px 1px 0; }

/* Main logo */
.logo {
  position:relative; z-index:10;
  display:flex; flex-direction:column; align-items:flex-start; gap:4px;
}

/* Main wordmark */
.wordmark {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-style: italic;
  font-size: 110px;
  line-height: 0.9;
  letter-spacing: -2px;
  display:flex; align-items:baseline; gap:0;
}

.flow  {
  color: #00d4ff;
  text-shadow:
    0 0 30px rgba(0,212,255,0.6),
    0 0 60px rgba(0,212,255,0.3);
}
.guard {
  color: #ffffff;
}

/* Underline bar */
.bar-wrap {
  display:flex; align-items:center; gap:12px; margin-top:2px;
}
.bar {
  height: 3px;
  width: 420px;
  background: linear-gradient(90deg, #00d4ff 0%, rgba(0,212,255,0.2) 70%, transparent 100%);
}

/* Tagline */
.tagline {
  font-family: 'Barlow', sans-serif;
  font-weight: 600;
  font-style: normal;
  font-size: 13px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  margin-top: 6px;
}

.by {
  font-family: 'Barlow', sans-serif;
  font-size: 11px;
  letter-spacing: 2px;
  color: rgba(0,212,255,0.45);
  margin-top: 2px;
}

/* Shield accent — small, top-right of wordmark */
.shield-accent {
  position:absolute;
  top: -8px;
  right: -44px;
  opacity: 0.7;
}
</style>
</head>
<body>
<div class="glow"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="logo">
  <div style="position:relative; display:inline-block;">
    <div class="wordmark">
      <span class="flow">FLOW</span><span class="guard">GUARD</span>
    </div>
    <!-- Shield accent SVG -->
    <svg class="shield-accent" width="32" height="36" viewBox="0 0 32 36" fill="none">
      <path d="M16 1L2 7v10c0 9 6.5 17.4 14 19.5C23.5 34.4 30 26 30 17V7L16 1z"
        fill="rgba(0,212,255,0.08)"
        stroke="#00d4ff" stroke-width="1.2"/>
    </svg>
  </div>

  <div class="bar-wrap">
    <div class="bar"></div>
  </div>

  <div class="tagline">AI Security Monitor</div>
  <div class="by">by EHZ-AI · 054-4825276</div>
</div>

</body>
</html>
