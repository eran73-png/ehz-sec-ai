<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box;}
html{background:#060d1a;width:1920px;height:1080px;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;}
body{width:1920px;height:1080px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,212,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.04) 1px,transparent 1px);background-size:60px 60px;}
.ring{position:absolute;border-radius:50%;border:1px solid rgba(0,212,255,0.1);top:50%;left:50%;transform:translate(-50%,-50%);}
.r1{width:800px;height:800px;}.r2{width:600px;height:600px;border-color:rgba(0,212,255,0.07);}.r3{width:400px;height:400px;border-color:rgba(0,212,255,0.05);}
.glow{position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(0,212,255,0.18) 0%,transparent 65%);top:50%;left:50%;transform:translate(-50%,-50%);}
.corner{position:absolute;width:50px;height:50px;border-color:#00d4ff;border-style:solid;opacity:0.28;}
.corner-tl{top:32px;left:32px;border-width:2px 0 0 2px;}.corner-tr{top:32px;right:32px;border-width:2px 2px 0 0;}
.corner-bl{bottom:32px;left:32px;border-width:0 0 2px 2px;}.corner-br{bottom:32px;right:32px;border-width:0 2px 2px 0;}
.slide-logo{position:absolute;top:36px;left:36px;z-index:50;display:flex;align-items:center;gap:10px;}
.sl-icon{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,#00d4ff,#0066cc);display:flex;align-items:center;justify-content:center;font-size:18px;}
.sl-name{font-size:17px;font-weight:800;color:#fff;}.sl-name em{color:#00d4ff;font-style:normal;}

.content{position:relative;z-index:10;text-align:center;display:flex;flex-direction:column;align-items:center;}
.logo-box{width:120px;height:120px;border-radius:30px;background:linear-gradient(135deg,#00d4ff,#0066cc);display:flex;align-items:center;justify-content:center;font-size:60px;margin-bottom:36px;box-shadow:0 0 100px rgba(0,212,255,0.5),0 20px 60px rgba(0,0,0,0.4);}
.eyebrow{font-size:14px;letter-spacing:6px;color:rgba(0,212,255,0.7);text-transform:uppercase;font-weight:700;margin-bottom:18px;}
.brand{font-size:88px;font-weight:900;color:#fff;letter-spacing:-3px;line-height:1;margin-bottom:12px;text-shadow:0 0 120px rgba(0,212,255,0.4);}
.brand em{color:#00d4ff;font-style:normal;}
.tag{font-size:22px;color:rgba(255,255,255,0.4);letter-spacing:3px;margin-bottom:48px;}
.divider{width:120px;height:3px;background:linear-gradient(90deg,transparent,#00d4ff,transparent);margin-bottom:40px;}
.desc{font-size:26px;font-weight:600;color:rgba(255,255,255,0.8);line-height:1.5;margin-bottom:40px;}
.pills{display:flex;gap:16px;}
.pill{padding:12px 28px;border-radius:100px;background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.3);font-size:16px;font-weight:700;color:#00d4ff;letter-spacing:1px;}
</style></head><body>
<div class="grid"></div><div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div><div class="glow"></div>
<div class="corner corner-tl"></div><div class="corner corner-tr"></div>
<div class="corner corner-bl"></div><div class="corner corner-br"></div>
<div class="slide-logo"><div class="sl-icon">🛡️</div><div class="sl-name">Flow<em>Guard</em></div></div>

<div class="content">
  <div class="logo-box">🛡️</div>
  <div class="eyebrow">Introducing</div>
  <div class="brand">Flow<em>Guard</em></div>
  <div class="tag">Claude Code Security Monitor</div>
  <div class="divider"></div>
  <div class="desc">The first dedicated security layer for AI coding assistants.<br>Real-time. Zero-config. Always on.</div>
  <div class="pills">
    <span class="pill">6 Detection Engines</span>
    <span class="pill">Instant Alerts</span>
    <span class="pill">Local Deploy</span>
    <span class="pill">v2.0.0</span>
  </div>
</div>
</body></html>
